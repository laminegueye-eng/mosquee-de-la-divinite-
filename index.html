<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Polices du gabarit : Cormorant Garamond (texte) + Cinzel (majuscules) + Noto Naskh Arabic -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Cinzel:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Tarif : police d'identité de la charte graphique -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=tarif@400,500,700&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS CDN pour la Boutique (Preflight désactivé pour éviter les conflits CSS avec l'accueil) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        corePlugins: {
          preflight: false,
        },
        theme: {
          extend: {
            colors: {
              primary: "#EABA10", // Doré officiel de la mosquée
              secondary: "#C11616", // Rouge officiel de la mosquée
              surface: "#FAF7F0", // Fond crème officiel de la mosquée (remplace le blanc moderne)
              "on-surface": "#0D0D0D", // Noir d'encre officiel
              "on-surface-variant": "#4A4A4A", // Gris pierre officiel
              "outline-variant": "rgba(2, 43, 51, 0.08)", // Filet vert sapin
              "surface-container-lowest": "#FFFFFF" // Blanc pur (pour détacher les cartes produits)
            },
            fontFamily: {
              headline: ["Cormorant Garamond", "serif"],
              display: ["Tarif", "Cormorant Garamond", "serif"],
              body: ["Cormorant Garamond", "serif"], // Police à empattement de l'accueil
              label: ["Cinzel", "serif"], // Police majuscule de marque
              arabic: ["Noto Naskh Arabic", "serif"]
            },
            borderRadius: {
              "DEFAULT": "0px",
              "lg": "0px",
              "xl": "0px",
              "full": "9999px"
            },
            spacing: {
              'gutter-h': '5%',
              'section-v-desktop': '120px',
              'section-v-mobile': '64px'
            }
          }
        }
      }
    </script>
    <title>Mosquée de la Divinité</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
